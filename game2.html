<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medieval Merchant Clicker</title>

    <link rel="stylesheet" href="css/site.css">
    <link rel="stylesheet" href="css/game2.css">
</head>

<body>
    <header class="site-header">
        <nav class="site-nav" aria-label="Main navigation">
            <a class="brand" href="index.html">Jacek Ziemiański</a>
            <a href="index.html">Home</a>
            <a href="experiments.html" aria-current="page">Experiments</a>
            <a href="links.html">Links</a>
            <a href="about.html">About</a>
        </nav>
    </header>

    <main class="game-shell">
        <section class="intro">
            <p class="eyebrow">Experiment</p>
            <h1>Medieval Merchant Clicker</h1>
            <p class="lead">Rise from roadside trade to a merchant network spanning markets, caravans, ports, and courts.</p>
        </section>

        <section class="game-panel" aria-labelledby="work-heading">
            <h2 id="work-heading">Work</h2>
            <p class="money-row">
                Money: <strong class="money">0</strong>$
            </p>
            <p class="income-row">
                Auto income: <strong class="income">0</strong>$/s
            </p>
            <p class="feedback-line" aria-live="polite">
                <span class="last-gain">Ready.</span>
            </p>
            <div class="game-actions">
                <button type="button" class="secondary-button" onclick="resetGame()">Reset game</button>
            </div>
            <div class="work-buttons" id="work-buttons"></div>
        </section>
    </main>
    <footer class="site-footer">
        <p>Created by Jacek Ziemiański. &copy; 2025-2026</p>
    </footer>

    <script src="js/game2.js"></script>
</body>

</html>
