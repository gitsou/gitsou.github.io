<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game2</title>

    <link rel="stylesheet" href="game2.css">
</head>

<body>
    <h1>Game2</h1>
    <h2>The Clicker Game</h2>
    <p>
        Money: <strong class="money">0</strong>$
    </p>
    <div class="work-buttons">
        <div class="work-item">
            <button type="button" id="button0" onclick="work(0)">Work 1</button>
            <a href="#" id="buy0" onclick="buyWork(0); return false;">Buy</a>
        </div>
        <div class="work-item">
            <button type="button" id="button1" onclick="work(1)">Work 2</button>
            <a href="#" id="buy1" onclick="buyWork(1); return false;">Buy</a>
        </div>
        <div class="work-item">
            <button type="button" id="button2" onclick="work(2)">Work 3</button>
            <a href="#" id="buy2" onclick="buyWork(2); return false;">Buy</a>
        </div>
        <div class="work-item">
            <button type="button" id="button3" onclick="work(3)">Work 4</button>
            <a href="#" id="buy3" onclick="buyWork(3); return false;">Buy</a>
        </div>
        <div class="work-item">
            <button type="button" id="button4" onclick="work(4)">Work 5</button>
            <a href="#" id="buy4" onclick="buyWork(4); return false;">Buy</a>
        </div>
    </div>

    <script src="game2.js"></script>
</body>

</html>
