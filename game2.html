<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game2</title>

    <link rel="stylesheet" href="site.css">
    <link rel="stylesheet" href="game2.css">
</head>

<body>
    <header class="site-header">
        <nav class="site-nav" aria-label="Main navigation">
            <a class="brand" href="index.html">Jacek Ziemiański</a>
            <a href="index.html">Home</a>
            <a href="games.html" aria-current="page">Games</a>
            <a href="links.html">Links</a>
            <a href="about.html">About</a>
        </nav>
    </header>

    <main class="game-shell">
        <section class="intro">
            <p class="eyebrow">Experiment</p>
            <h1>Clicker Game</h1>
            <p class="lead">Earn money, buy better work, then automate the work you already own.</p>
        </section>

        <section class="game-panel" aria-labelledby="work-heading">
            <h2 id="work-heading">Work</h2>
            <p class="money-row">
                Money: <strong class="money">0</strong>$
            </p>
            <p class="income-row">
                Auto income: <strong class="income">0</strong>$/s
            </p>
            <p class="feedback-line" aria-live="polite">
                <span class="last-gain">Ready.</span>
            </p>
            <div class="game-actions">
                <button type="button" class="secondary-button" onclick="resetGame()">Reset game</button>
            </div>
            <div class="work-buttons">
                <div class="work-item">
                    <button type="button" id="button0" onclick="work(0)">Work 1</button>
                    <span class="work-info" id="info0"></span>
                    <button type="button" class="action-button" id="auto0" onclick="buyAuto(0)">Auto</button>
                    <button type="button" class="action-button" id="buy0" onclick="buyWork(0)">Buy</button>
                </div>
                <div class="work-item">
                    <button type="button" id="button1" onclick="work(1)">Work 2</button>
                    <span class="work-info" id="info1"></span>
                    <button type="button" class="action-button" id="auto1" onclick="buyAuto(1)">Auto</button>
                    <button type="button" class="action-button" id="buy1" onclick="buyWork(1)">Buy</button>
                </div>
                <div class="work-item">
                    <button type="button" id="button2" onclick="work(2)">Work 3</button>
                    <span class="work-info" id="info2"></span>
                    <button type="button" class="action-button" id="auto2" onclick="buyAuto(2)">Auto</button>
                    <button type="button" class="action-button" id="buy2" onclick="buyWork(2)">Buy</button>
                </div>
                <div class="work-item">
                    <button type="button" id="button3" onclick="work(3)">Work 4</button>
                    <span class="work-info" id="info3"></span>
                    <button type="button" class="action-button" id="auto3" onclick="buyAuto(3)">Auto</button>
                    <button type="button" class="action-button" id="buy3" onclick="buyWork(3)">Buy</button>
                </div>
                <div class="work-item">
                    <button type="button" id="button4" onclick="work(4)">Work 5</button>
                    <span class="work-info" id="info4"></span>
                    <button type="button" class="action-button" id="auto4" onclick="buyAuto(4)">Auto</button>
                    <button type="button" class="action-button" id="buy4" onclick="buyWork(4)">Buy</button>
                </div>
            </div>
        </section>
    </main>
    <footer class="site-footer">
        <p>Created by Jacek Ziemiański. &copy; 2025</p>
    </footer>

    <script src="game2.js"></script>
</body>

</html>
