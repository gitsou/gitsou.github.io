<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game2</title>

    <link rel="stylesheet" href="game2.css">
</head>

<body>
    <h1>Game2</h1>
    <h2>The Clicker Game</h2>
    <p>
        Money: <strong class="money">0</strong>$
    </p>
    <div class="work-buttons">
        <div class="work-item">
            <button type="button" onclick="work1()">Work 1</button>
            <input type="checkbox" id="auto0" onchange="toggleAuto(0)">
        </div>
        <div class="work-item">
            <button type="button" onclick="work2()">Work 2</button>
            <input type="checkbox" id="auto1" onchange="toggleAuto(1)">
        </div>
        <div class="work-item">
            <button type="button" onclick="work3()">Work 3</button>
            <input type="checkbox" id="auto2" onchange="toggleAuto(2)">
        </div>
        <div class="work-item">
            <button type="button" onclick="work4()">Work 4</button>
            <input type="checkbox" id="auto3" onchange="toggleAuto(3)">
        </div>
        <div class="work-item">
            <button type="button" onclick="work5()">Work 5</button>
            <input type="checkbox" id="auto4" onchange="toggleAuto(4)">
        </div>
    </div>

    <script src="game2.js"></script>
</body>

</html>
